<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StreamVault — Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
:root{
  --bg:#080b0f;--surface:#0d1117;--surface2:#161c26;--border:#1e2a3a;
  --accent:#00e5ff;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 50% 50% at 0% 0%,rgba(0,229,255,.03),transparent 60%),radial-gradient(ellipse 50% 50% at 100% 100%,rgba(124,58,237,.04),transparent 60%);
  pointer-events:none;z-index:0;
}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,15,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1.25rem;
}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.875rem}
.logo-text{font-weight:800;font-size:1rem;color:var(--text)}
.back-btn{display:flex;align-items:center;gap:.4rem;color:var(--muted);text-decoration:none;font-size:.8125rem;font-weight:600;padding:.375rem .75rem;border-radius:6px;transition:all .2s}
.back-btn:hover{color:var(--text);background:var(--surface2)}

/* Main layout */
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem}

/* Player container */
.player-wrap{
  position:relative;width:100%;background:#000;border-radius:14px;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
  border:1px solid var(--border);
}

/* Fullscreen Fixes: No Crop, perfect fit */
.player-wrap:fullscreen{
  border-radius:0;border:none;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.player-wrap:fullscreen video{
  width:100%;height:100%;object-fit:contain !important;
}
.player-wrap:-webkit-full-screen{
  border-radius:0;border:none;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.player-wrap:-webkit-full-screen video{
  width:100%;height:100%;object-fit:contain !important;
}

video{display:block;width:100%;aspect-ratio:16/9;background:#000;cursor:none;object-fit:contain}

/* Controls overlay */
.controls{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 60%,transparent 100%);
  padding:1rem;
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;gap:.625rem;
  z-index:10;
  pointer-events: none;
}
.player-wrap.controls-visible .controls{
  opacity:1;
  cursor:default;
  pointer-events: auto;
}
.player-wrap:hover video,.player-wrap.controls-visible video{cursor:default}

/* Progress */
.progress-wrap{position:relative;height:4px;cursor:pointer;padding:8px 0;margin:-8px 0;display:flex;align-items:center}
.progress-track{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:2px;position:relative;overflow:visible}
.progress-buf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.15);border-radius:2px;transition:width .3s}
.progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:2px;transition:width .1s}
.progress-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;background:var(--accent);border-radius:50%;
  box-shadow:0 0 8px rgba(0,229,255,.6);
  opacity:0;transition:opacity .2s;cursor:pointer;
}
.progress-wrap:hover .progress-thumb,.progress-wrap:active .progress-thumb{opacity:1}
.progress-wrap:hover .progress-track{height:5px}

/* Bottom row */
.ctrl-row{display:flex;align-items:center;gap:.625rem}
.ctrl-btn{
  background:none;border:none;color:#fff;cursor:pointer;
  padding:.375rem;border-radius:6px;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;flex-shrink:0;opacity:.85;
}
.ctrl-btn:hover{background:rgba(255,255,255,.1);opacity:1;transform:scale(1.05)}
.ctrl-btn:active{transform:scale(.95)}

.vol-wrap{display:flex;align-items:center;gap:.375rem;flex-shrink:0}
.vol-slider{
  -webkit-appearance:none;width:70px;height:3px;background:rgba(255,255,255,.3);
  border-radius:2px;outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%;cursor:pointer}
.vol-slider::-moz-range-thumb{width:12px;height:12px;background:#fff;border-radius:50%;border:none;cursor:pointer}

.time-display{font-family:var(--mono);font-size:.75rem;color:rgba(255,255,255,.8);white-space:nowrap;flex-shrink:0}
.ctrl-spacer{flex:1}

/* Unified Interaction Layer */
.click-capture-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* YouTube Style Side Seek Animations */
.youtube-seek-ripple {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 40%;
  background: rgba(255, 255, 255, 0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 6;
  opacity: 0;
  pointer-events: none;
}
.youtube-seek-ripple.left {
  left: 0;
  border-radius: 0 50% 50% 0 / 0 100% 100% 0;
}
.youtube-seek-ripple.right {
  right: 0;
  border-radius: 50% 0 0 50% / 100% 0 0 100%;
}
.youtube-seek-ripple span {
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  margin-top: 6px;
}

/* Keyframe Animations for YouTube Seek */
@keyframes ytRipple {
  0% { opacity: 0; background: rgba(255, 255, 255, 0.02); }
  20% { opacity: 1; background: rgba(255, 255, 255, 0.12); }
  100% { opacity: 0; background: rgba(255, 255, 255, 0.02); }
}
.youtube-seek-ripple.animate {
  animation: ytRipple 0.5s ease-in-out;
}
.youtube-seek-ripple.animate svg {
  animation: ytArrows 0.5s ease-in-out;
}
@keyframes ytArrows {
  0% { transform: scale(0.8); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 0.5; }
}

/* Center play/pause overlay */
.center-overlay{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:72px;height:72px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;pointer-events:none;
  z-index: 6;
}
.center-overlay.show{opacity:1;animation:centerPop .4s ease forwards}
@keyframes centerPop{0%{transform:translate(-50%,-50%) scale(.7);opacity:1}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}

/* Quality badge */
.quality-btn{font-family:var(--mono);font-size:.65rem;font-weight:700;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:.2rem .45rem;cursor:pointer;transition:background .15s}
.quality-btn:hover{background:rgba(0,229,255,.2)}

/* Bottom info */
.video-info{margin-top:1.25rem;margin-bottom:.875rem}
.video-info h1{font-size:1.375rem;font-weight:800;line-height:1.3;margin-bottom:.375rem}
.video-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.meta-chip{font-family:var(--mono);font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}

/* Stream link */
.stream-link-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
  margin-bottom:1.5rem;
}
.stream-link-label{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);flex-shrink:0}
.stream-link-url{font-family:var(--mono);font-size:.775rem;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{
  background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);
  color:var(--accent);padding:.375rem .875rem;border-radius:6px;
  font-family:var(--mono);font-size:.75rem;font-weight:700;cursor:pointer;flex-shrink:0;
  transition:all .2s;
}
.copy-btn:hover{background:rgba(0,229,255,.15)}
.copy-btn.copied{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#10b981}

/* Loader spinner */
.spinner-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);pointer-events:none;
  opacity:0;transition:opacity .3s;
  z-index: 7;
}
.spinner-overlay.show{opacity:1}
.spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.video-error{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.8);text-align:center;padding:2rem;
  opacity:0;pointer-events:none;transition:opacity .3s;
  z-index: 8;
}
.video-error.show{opacity:1;pointer-events:all}
.video-error h3{font-size:1.125rem;margin-bottom:.5rem;color:#fff}
.video-error p{font-size:.875rem;color:var(--muted)}

@media(max-width:600px){
  .vol-wrap{display:none}
  .time-display{font-size:.7rem}
  .video-info h1{font-size:1.125rem}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">StreamVault</span>
  </a>
  <a href="/" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Gallery
  </a>
</nav>

<div class="page">
  <div class="player-wrap" id="playerWrap">
    <video id="video" playsinline preload="auto"></video>

    <div class="click-capture-layer" id="clickCapture"></div>

    <div class="youtube-seek-ripple left" id="ytSeekLeft">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
      </svg>
      <span>10 seconds</span>
    </div>

    <div class="youtube-seek-ripple right" id="ytSeekRight">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
        <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
      </svg>
      <span>10 seconds</span>
    </div>

    <div class="center-overlay" id="centerOverlay">
      <svg id="centerIcon" width="28" height="28" viewBox="0 0 24 24" fill="white"></svg>
    </div>

    <div class="spinner-overlay show" id="spinner"><div class="spinner"></div></div>

    <div class="video-error" id="videoError">
      <h3>⚠ Playback Error</h3>
      <p id="videoErrorMsg">Failed to load stream.</p>
    </div>

    <div class="controls" id="controls">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track" id="progressTrack">
          <div class="progress-buf" id="progressBuf" style="width:0%"></div>
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
          <div class="progress-thumb" id="progressThumb" style="left:0%"></div>
        </div>
      </div>

      <div class="ctrl-row">
        <button class="ctrl-btn" id="playBtn" title="Play/Pause (Space)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon id="playIcon" points="5,3 19,12 5,21"/></svg>
        </button>

        <div class="vol-wrap">
          <button class="ctrl-btn" id="muteBtn" title="Mute (M)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" id="volIcon">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1">
        </div>

        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>

        <div class="ctrl-spacer"></div>

        <span class="quality-btn" id="qualityBadge">AUTO</span>

        <button class="ctrl-btn pip-btn" id="pipBtn" title="Picture in Picture">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="11" width="9" height="6" rx="1" fill="white" stroke="none"/></svg>
        </button>

        <button class="ctrl-btn" id="fsBtn" title="Fullscreen (F)">
          <svg id="fsIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="video-info">
    <h1 id="videoTitle">Loading…</h1>
    <div class="video-meta" id="videoMeta"></div>
  </div>

  <div class="stream-link-card">
    <span class="stream-link-label">M3U8 Stream</span>
    <span class="stream-link-url" id="streamUrl">—</span>
    <button class="copy-btn" id="copyBtn" onclick="copyStreamUrl()">Copy</button>
  </div>
</div>

<script>
const videoId = location.pathname.split('/').pop();
const video = document.getElementById('video');
const playerWrap = document.getElementById('playerWrap');
const clickCapture = document.getElementById('clickCapture');
let hls = null;
let hideControlsTimer;
let videoData = null;

// ── Load video data ──────────────────────────────────────────────────────────
async function loadVideo() {
  try {
    const resp = await fetch(`/api/videos/${videoId}`);
    if (!resp.ok) throw new Error('Video not found');
    videoData = await resp.json();
    document.title = videoData.title + ' — StreamVault';
    document.getElementById('videoTitle').textContent = videoData.title;

    const meta = [];
    if (videoData.duration) meta.push(`<span class="meta-chip">⏱ ${fmtDuration(videoData.duration)}</span>`);
    if (videoData.size_bytes) meta.push(`<span class="meta-chip">💾 ${fmtBytes(videoData.size_bytes)}</span>`);
    if (videoData.created_at) meta.push(`<span class="meta-chip">📅 ${new Date(videoData.created_at).toLocaleDateString()}</span>`);
    document.getElementById('videoMeta').innerHTML = meta.join('');

    const streamUrl = location.origin + videoData.m3u8_path;
    document.getElementById('streamUrl').textContent = streamUrl;

    initPlayer(streamUrl);
  } catch(e) {
    showError(e.message);
  }
}

// ── HLS Player ───────────────────────────────────────────────────────────────
function initPlayer(src) {
  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      lowLatencyMode: false,
      progressive: true,
      startLevel: -1,
      abrEwmaDefaultEstimate: 5000000,
    });
    hls.loadSource(src);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      hideSpinner();
      video.play().catch(() => {});
    });

    hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
      const lvl = hls.levels[data.level];
      const badge = document.getElementById('qualityBadge');
      if (lvl && lvl.height) badge.textContent = lvl.height + 'p';
      else badge.textContent = 'AUTO';
    });

    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
        else showError('Fatal stream error');
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    video.addEventListener('loadedmetadata', () => { hideSpinner(); video.play().catch(()=>{}); });
  } else {
    showError('HLS not supported in this browser.');
  }
}

// ── Controls Hide / Show Logic ───────────────────────────────────────────────
function showControls() {
  playerWrap.classList.add('controls-visible');
  resetHideTimer();
}

function hideControls() {
  if (!video.paused) {
    playerWrap.classList.remove('controls-visible');
  }
}

function toggleControls() {
  if (playerWrap.classList.contains('controls-visible')) {
    hideControls();
  } else {
    showControls();
  }
}

// Controls auto hide in 3s when playing
function resetHideTimer() {
  clearTimeout(hideControlsTimer);
  if (!video.paused) {
    hideControlsTimer = setTimeout(hideControls, 3000);
  }
}

playerWrap.addEventListener('mousemove', showControls);
video.addEventListener('pause', () => playerWrap.classList.add('controls-visible'));
video.addEventListener('play', () => { resetHideTimer(); });

// ── YouTube Style Double Tap to Seek & Single Tap to Toggle ─────────────────
let lastTapTime = 0;
let tapTimeout;

clickCapture.addEventListener('click', (e) => {
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTapTime;
  
  clearTimeout(tapTimeout);
  
  if (tapLength < 300 && tapLength > 0) {
    // ── DOUBLE TAP DETECTED ──
    const rect = clickCapture.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const width = rect.width;

    if (clickX < width * 0.4) {
      triggerYtAnimation('left');
      seekRelative(-10);
    } else if (clickX > width * 0.6) {
      triggerYtAnimation('right');
      seekRelative(10);
    } else {
      togglePlay(); // Center double tap -> Play/Pause
    }
  } else {
    // ── SINGLE TAP DETECTED ──
    tapTimeout = setTimeout(() => {
      toggleControls();
    }, 250);
  }
  lastTapTime = currentTime;
});

function seekRelative(sec) {
  video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + sec));
  showControls();
}

function triggerYtAnimation(side) {
  const el = side === 'left' ? document.getElementById('ytSeekLeft') : document.getElementById('ytSeekRight');
  el.classList.remove('animate');
  void el.offsetWidth; // Trigger reflow to restart animation
  el.classList.add('animate');
  setTimeout(() => el.classList.remove('animate'), 500);
}

// ── Play / Pause ─────────────────────────────────────────────────────────────
function togglePlay() {
  if (video.paused) video.play();
  else video.pause();
}

document.getElementById('playBtn').onclick = togglePlay;

video.addEventListener('play', () => {
  document.getElementById('playIcon').setAttribute('points','6,3 6,21 M14,3 14,21');
  document.getElementById('playIcon').innerHTML = '';
  const path1 = document.createElementNS('http://www.w3.org/2000/svg','rect');
  path1.setAttribute('x','6');path1.setAttribute('y','4');path1.setAttribute('width','4');path1.setAttribute('height','16');path1.setAttribute('fill','white');
  const path2 = document.createElementNS('http://www.w3.org/2000/svg','rect');
  path2.setAttribute('x','14');path2.setAttribute('y','4');path2.setAttribute('width','4');path2.setAttribute('height','16');path2.setAttribute('fill','white');
  document.getElementById('playIcon').appendChild(path1);
  document.getElementById('playIcon').appendChild(path2);
});

video.addEventListener('pause', () => {
  const icon = document.getElementById('playIcon');
  icon.innerHTML = '';
  icon.setAttribute('points','5,3 19,12 5,21');
  icon.setAttribute('fill','white');
});

function showCenterIcon(playing) {
  const overlay = document.getElementById('centerOverlay');
  const icon = document.getElementById('centerIcon');
  overlay.classList.remove('show');
  void overlay.offsetWidth;
  icon.innerHTML = playing
    ? '<path d="M10 4H6v16h4V4zm8 0h-4v16h4V4z" fill="white"/>'
    : '<polygon points="5,3 19,12 5,21" fill="white"/>';
  overlay.classList.add('show');
}

video.addEventListener('play', () => showCenterIcon(true));
video.addEventListener('pause', () => showCenterIcon(false));

// ── Progress bar ─────────────────────────────────────────────────────────────
let isDragging = false;

video.addEventListener('timeupdate', updateProgress);
video.addEventListener('progress', updateBuffer);
video.addEventListener('waiting', () => document.getElementById('spinner').classList.add('show'));
video.addEventListener('playing', hideSpinner);
video.addEventListener('canplay', hideSpinner);

function updateProgress() {
  if (!video.duration || isDragging) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressThumb').style.left = pct + '%';
  document.getElementById('timeDisplay').textContent = fmtDuration(video.currentTime) + ' / ' + fmtDuration(video.duration);
}

function updateBuffer() {
  if (!video.duration) return;
  let bufEnd = 0;
  for (let i = 0; i < video.buffered.length; i++) {
    if (video.buffered.start(i) <= video.currentTime) bufEnd = video.buffered.end(i);
  }
  document.getElementById('progressBuf').style.width = (bufEnd / video.duration * 100) + '%';
}

const progressWrap = document.getElementById('progressWrap');
progressWrap.addEventListener('mousedown', startDrag);
progressWrap.addEventListener('touchstart', startDrag, {passive:false});

function startDrag(e) {
  isDragging = true;
  showControls();
  seek(e);
  document.addEventListener('mousemove', seek);
  document.addEventListener('touchmove', seek, {passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
}

function endDrag() {
  isDragging = false;
  resetHideTimer();
  document.removeEventListener('mousemove', seek);
  document.removeEventListener('touchmove', seek);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchend', endDrag);
}

function seek(e) {
  if (!video.duration) return;
  e.preventDefault();
  const track = document.getElementById('progressTrack');
  const rect = track.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  video.currentTime = pct * video.duration;
  document.getElementById('progressFill').style.width = pct*100 + '%';
  document.getElementById('progressThumb').style.left = pct*100 + '%';
}

// ── Volume ───────────────────────────────────────────────────────────────────
const volSlider = document.getElementById('volSlider');
volSlider.addEventListener('input', () => { video.volume = volSlider.value; updateVolIcon(); });

document.getElementById('muteBtn').onclick = () => {
  video.muted = !video.muted;
  volSlider.value = video.muted ? 0 : video.volume;
  updateVolIcon();
};

function updateVolIcon() {
  const icon = document.getElementById('volIcon');
  if (video.muted || video.volume === 0) {
    icon.innerHTML = '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="white" stroke-width="2"/>';
  } else {
    icon.innerHTML = '<polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  }
}

// ── Fullscreen ───────────────────────────────────────────────────────────────
document.getElementById('fsBtn').onclick = toggleFullscreen;

function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (playerWrap.requestFullscreen || playerWrap.webkitRequestFullscreen).call(playerWrap);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}

document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);
function updateFsIcon() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  document.getElementById('fsIcon').innerHTML = isFs
    ? '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>'
    : '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
}

// ── PiP ──────────────────────────────────────────────────────────────────────
document.getElementById('pipBtn').onclick = async () => {
  try {
    if (document.pictureInPictureElement) await document.exitPictureInPicture();
    else await video.requestPictureInPicture();
  } catch(e) { console.log('PiP not supported'); }
};

// ── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'f': toggleFullscreen(); break;
    case 'm': video.muted = !video.muted; updateVolIcon(); break;
    case 'ArrowLeft': seekRelative(-10); break;
    case 'ArrowRight': seekRelative(10); break;
    case 'ArrowUp': e.preventDefault(); video.volume = Math.min(1, video.volume+.1); volSlider.value = video.volume; updateVolIcon(); break;
    case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume-.1); volSlider.value = video.volume; updateVolIcon(); break;
  }
});

// ── Copy stream URL ───────────────────────────────────────────────────────────
function copyStreamUrl() {
  const url = document.getElementById('streamUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function hideSpinner() { document.getElementById('spinner').classList.remove('show'); }
function showError(msg) {
  document.getElementById('videoErrorMsg').textContent = msg;
  document.getElementById('videoError').classList.add('show');
  hideSpinner();
}

function fmtDuration(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtBytes(b) {
  if (!b) return '';
  if (b < 1048576) return (b/1024).toFixed(0)+' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}

loadVideo();
</script>
