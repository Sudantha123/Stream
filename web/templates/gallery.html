<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b0f;
  --surface: #0d1117;
  --surface2: #161c26;
  --surface3: #1d2535;
  --border: #1e2a3a;
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --danger: #ef4444;
  --success: #10b981;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(0,229,255,.03) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 90%,rgba(124,58,237,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

nav{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,15,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:.875rem 1.5rem;gap:1rem;flex-wrap:wrap;
}
.logo{display:flex;align-items:center;gap:.625rem;text-decoration:none;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo-text{font-family:var(--sans);font-weight:800;font-size:1.15rem;color:var(--text)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.nav-link{color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:600;padding:.4rem .75rem;border-radius:6px;transition:all .2s}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface2)}

/* Search */
.search-wrap{position:relative;flex:1;max-width:400px}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#searchInput{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:.5rem .75rem .5rem 2.25rem;
  border-radius:8px;font-family:var(--mono);font-size:.825rem;
  outline:none;transition:border-color .2s;
}
#searchInput:focus{border-color:var(--accent)}
#searchInput::placeholder{color:var(--muted)}

/* Suggestions */
.suggestions{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;z-index:200;display:none;
  box-shadow:0 16px 40px rgba(0,0,0,.5);
}
.suggestions.show{display:block}
.suggest-item{
  padding:.625rem 1rem;cursor:pointer;font-size:.8125rem;
  transition:background .15s;display:flex;align-items:center;gap:.625rem;
}
.suggest-item:hover{background:var(--surface2)}
.suggest-thumb{width:48px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--surface3)}
.suggest-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2rem 1.25rem}

/* Stats bar */
.stats{display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:.2rem}
.stat-val{font-size:1.5rem;font-weight:800;font-family:var(--mono);color:var(--accent)}
.stat-lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
@media(max-width:400px){.grid{grid-template-columns:1fr}}

/* Video card */
.video-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:fadeUp .4s ease both;
}
.video-card:hover{transform:translateY(-4px);border-color:rgba(0,229,255,.25);box-shadow:0 12px 40px rgba(0,0,0,.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.thumb-wrap{position:relative;width:100%;padding-top:56.25%;background:var(--surface2);overflow:hidden}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s}
.video-card:hover .thumb-wrap img{transform:scale(1.04)}
.thumb-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.0);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.video-card:hover .thumb-overlay{background:rgba(0,0,0,.35)}
.play-btn{
  width:52px;height:52px;background:rgba(0,229,255,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.7);transition:opacity .2s,transform .2s;
  flex-shrink:0;
}
.video-card:hover .play-btn{opacity:1;transform:scale(1)}
.play-btn svg{margin-left:3px}
.duration-badge{
  position:absolute;bottom:.5rem;right:.5rem;
  background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  font-family:var(--mono);font-size:.7rem;padding:.15rem .4rem;border-radius:4px;
}

.card-info{padding:.875rem 1rem 1rem}
.card-title{font-weight:700;font-size:.9rem;line-height:1.3;margin-bottom:.375rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-meta{display:flex;justify-content:space-between;align-items:center}
.card-date{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.card-size{font-family:var(--mono);font-size:.7rem;color:var(--muted)}

.delete-btn{
  position:absolute;top:.5rem;right:.5rem;
  width:28px;height:28px;background:rgba(239,68,68,.8);backdrop-filter:blur(4px);
  border:none;border-radius:6px;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.8);transition:opacity .2s,transform .2s;z-index:10;
}
.video-card:hover .delete-btn{opacity:1;transform:scale(1)}
.delete-btn:hover{background:var(--danger)}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-backdrop.show{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:2rem;max-width:380px;width:90%;
  transform:scale(.95);transition:transform .2s;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.modal-backdrop.show .modal{transform:scale(1)}
.modal h3{font-size:1.125rem;font-weight:800;margin-bottom:.625rem}
.modal p{color:var(--muted);font-size:.875rem;margin-bottom:1.5rem;line-height:1.5}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.625rem 1.25rem;border-radius:8px;font-family:var(--sans);font-weight:700;font-size:.875rem;cursor:pointer;border:none;transition:all .2s}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.9;transform:translateY(-1px)}

/* Empty */
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-icon{font-size:4rem;margin-bottom:1rem;opacity:.3}
.empty p{font-size:.9375rem;margin-bottom:1.25rem}
.empty a{color:var(--accent);text-decoration:none;font-weight:700}

/* Loader */
.loader{display:flex;justify-content:center;padding:3rem}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">StreamVault</span>
  </a>
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Search videos…" autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>
  <div class="nav-right">
    <a href="/admin" class="nav-link">Dashboard</a>
  </div>
</nav>

<main>
  <div class="stats" id="statsBar"></div>
  <div id="grid" class="grid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</main>

<!-- Delete confirm modal -->
<div class="modal-backdrop" id="deleteModal">
  <div class="modal">
    <h3>Delete Video?</h3>
    <p id="deleteModalTitle">This will permanently delete the video and all HLS segments.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
let videos = [];
let deleteTargetId = null;
let searchDebounce;
let ws;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'job_done') {
      videos.unshift(msg.data.video);
      renderGrid(videos);
      updateStats();
    }
    if (msg.type === 'video_deleted') {
      videos = videos.filter(v => v.id !== msg.data);
      renderGrid(videos);
      updateStats();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

async function loadVideos() {
  const resp = await fetch('/api/videos');
  videos = await resp.json();
  renderGrid(videos);
  updateStats();
}

function fmtDuration(sec) {
  if (!sec) return '';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function fmtBytes(b) {
  if (!b) return '';
  if (b < 1048576) return (b/1024).toFixed(0)+' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function updateStats() {
  const totalSize = videos.reduce((a,v) => a+(v.size_bytes||0), 0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val">${videos.length}</div><div class="stat-lbl">Videos</div></div>
    <div class="stat"><div class="stat-val">${fmtBytes(totalSize)||'0 B'}</div><div class="stat-lbl">Total Size</div></div>
  `;
}

function renderGrid(list) {
  const grid = document.getElementById('grid');
  if (!list || list.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🎬</div>
      <p>No videos yet. Go to the <a href="/admin">Dashboard</a> to add a video.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map((v, i) => `
    <div class="video-card" style="animation-delay:${i*0.04}s" onclick="goWatch('${v.id}')">
      <div class="thumb-wrap">
        <img src="${v.thumbnail||''}" alt="${escHtml(v.title)}" loading="lazy" onerror="this.style.display='none'">
        <div class="thumb-overlay">
          <div class="play-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>
        ${v.duration ? `<div class="duration-badge">${fmtDuration(v.duration)}</div>` : ''}
        <button class="delete-btn" onclick="event.stopPropagation();openDeleteModal('${v.id}','${escHtml(v.title)}')" title="Delete">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(v.title)}</div>
        <div class="card-meta">
          <span class="card-date">${fmtDate(v.created_at)}</span>
          <span class="card-size">${fmtBytes(v.size_bytes)}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function goWatch(id) { location.href = '/watch/' + id; }

// Search
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if (!q) {
    renderGrid(videos);
    hideSuggestions();
    return;
  }
  searchDebounce = setTimeout(async () => {
    const resp = await fetch('/api/videos/search?q=' + encodeURIComponent(q));
    const results = await resp.json();
    renderGrid(results);
    showSuggestions(results, q);
  }, 200);
});

function showSuggestions(results, q) {
  if (!results || results.length === 0) { hideSuggestions(); return; }
  suggestionsEl.innerHTML = results.slice(0,6).map(v => `
    <div class="suggest-item" onclick="goWatch('${v.id}')">
      <img class="suggest-thumb" src="${v.thumbnail||''}" alt="" onerror="this.style.display='none'">
      <span class="suggest-title">${highlightMatch(escHtml(v.title), q)}</span>
    </div>
  `).join('');
  suggestionsEl.classList.add('show');
}

function hideSuggestions() { suggestionsEl.classList.remove('show'); }

function highlightMatch(text, q) {
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:rgba(0,229,255,.2);color:var(--accent);border-radius:2px">$1</mark>');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideSuggestions();
});

// Delete modal
function openDeleteModal(id, title) {
  deleteTargetId = id;
  document.getElementById('deleteModalTitle').textContent = `"${title}" — This will permanently delete the video and all HLS segments.`;
  document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal() {
  deleteTargetId = null;
  document.getElementById('deleteModal').classList.remove('show');
}
async function confirmDelete() {
  if (!deleteTargetId) return;
  await fetch('/api/videos/' + deleteTargetId, {method:'DELETE'});
  videos = videos.filter(v => v.id !== deleteTargetId);
  renderGrid(videos);
  updateStats();
  closeDeleteModal();
}

document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDeleteModal();
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadVideos();
connectWS();
</script>
</body>
</html>
